name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck renderer
        run: npx tsc --noEmit

      - name: Typecheck main process
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json
